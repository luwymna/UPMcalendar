<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPM - Academic Calendar & GPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://raw.githubusercontent.com/luwymna/UPMcalendar/refs/heads/main/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/luwymna/UPMcalendar/refs/heads/main/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/luwymna/UPMcalendar/refs/heads/main/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/luwymna/UPMcalendar/refs/heads/main/apple-touch-icon.png">
    <link rel="manifest" href="https://raw.githubusercontent.com/luwymna/UPMcalendar/refs/heads/main/site.webmanifest">
    <!-- https://raw.githubusercontent.com/luwymna/UPMcalendar/refs/heads/main/favicon.ico -->
</head>
<body>
    <button class="sidebar-toggle" id="toggleSidebarBtn">☰</button>
    <div class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
            <button class="nav-btn active" data-view="calendar">
                <span>Calendar</span>
            </button>
            <button class="nav-btn" data-view="gpa">
                <span>GPA Calculator</span>
            </button>
        </nav>
        <div class="sidebar-clock" id="sidebarClock">
            <div class="clock-date" id="clockDate"></div>
            <div class="clock-time" id="clockTime"></div>
        </div>
        <div class="music-player" id="musicPlayer">
            <div class="music-title">🎵 Serdang oh serdang</div>
            <div class="music-progress-wrap">
                <span class="time-label" id="currentTime">0:00</span>
                <input type="range" class="music-progress" id="musicProgress" min="0" max="100" value="0" step="0.1">
                <span class="time-label" id="durationTime">0:00</span>
            </div>
            <div class="music-controls">
                <button class="music-btn" id="musicPlayBtn">
                    <svg class="icon-play" viewBox="0 0 24 24" width="50" height="24" fill="currentColor" id="iconPlay">
                        <path d="M8 5l8 7-8 7z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <audio id="bgMusic" loop autoplay playsinline preload="auto">
                <source src="music.mp3" type="audio/mpeg">
            </audio>
        </div>
        <div class="sidebar-credit">DEV 4C 55 4C 55</div>
    </div>
    <div class="main-content" id="mainContent">
        <!-- Calendar -->
        <div id="calendar-view" class="view-pane active">
            <div class="container">
                <div class="info-row">
                    <div class="info-left">
                        <h1>UPM Academic Year 2025/2026</h1>
                    </div>
                <div class="info-right">
                    <div class="today-block">
                        <div class="today-date" id="todayDate"></div>
                        <div class="period-badge" id="periodBadge"></div>
                    </div>
                </div>
                <div class="study-level-filter">
                    <div class="custom-select" id="studyLevelSelect">
                        <div class="custom-select-trigger"><span>Bachelor</span></div>
                        <div class="custom-select-dropdown">
                            <div class="custom-select-option" data-value="bachelor">Bachelor</div>
                                    <div class="custom-select-option" data-value="foundation">ASPer</div>
                        </div>
                    </div>
                </div>
            </div>
                <div class="legend" id="legend"></div>
                <div class="calendar-summary" id="calendarSummary"></div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>

        <!-- GPA Calculator -->
        <div id="gpa-view" class="view-pane">
            <div class="gpa-container">
                <div class="grade-system">
                    <h3>UPM Grade System</h3>
                    <div class="grade-table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Grade</th>
                                    <th>A</th>
                                    <th>A-</th>
                                    <th>B+</th>
                                    <th>B</th>
                                    <th>B-</th>
                                    <th>C+</th>
                                    <th>C</th>
                                    <th>C-</th>
                                    <th>D+</th>
                                    <th>D</th>
                                    <th>F</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th>Pointer</th>
                                    <td>4.00</td>
                                    <td>3.75</td>
                                    <td>3.50</td>
                                    <td>3.00</td>
                                    <td>2.75</td>
                                    <td>2.50</td>
                                    <td>2.00</td>
                                    <td>1.75</td>
                                    <td>1.50</td>
                                    <td>1.00</td>
                                    <td>0.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="gpa-header-row">
                    <h1>Semester GPA Calculator</h1>
                    <button class="add-semester-btn" id="addSemesterBtn">➕ Add New Semester</button>
                </div>
                <div id="semestersContainer"></div>
                <div class="cgpa-section" id="cgpaSection">
                    <div class="cgpa-item">
                        <h3>🎓 CGPA (All Semesters)</h3>
                        <div class="cgpa-value" id="cgpaValue">0.00</div>
                    </div>
                    <div class="cgpa-item">
                        <h3>🎓 Status</h3>
                        <div class="cgpa-value" id="cgpaStatus">—</div>
                    </div>
                </div>


            </div>
        </div>



        <div id="dayInfo" class="day-info"></div>
    </div>



    <script src="script.js"></script>
    <!-- Floating Mobile Toggle Button -->
    <button class="mobile-sidebar-toggle" id="mobileToggleSidebarBtn">▶</button>
</body>
</html>
